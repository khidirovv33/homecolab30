<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalyst Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        font-family: "Inter", sans-serif;
      }

      body {
        background: radial-gradient(circle at top, #0d0f13 0%, #050607 55%, #000 100%);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0px 20px 80px rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(12px);
      }

      .grid-bg {
        background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 42px 42px;
      }

      .hero-pattern {
        background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 55px 55px;
      }

      .soft-border {
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .input-glow:focus {
        outline: none;
        box-shadow: 0px 0px 0px 4px rgba(0, 122, 255, 0.25);
      }
    </style>
  </head>

  <body class="text-white">
    <header class="w-full pt-8">
      <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="./photoR/Logo.png" alt="">
        </div>

        <nav class="hidden md:flex items-center gap-10 text-sm font-medium opacity-80">
          <a href="#" class="hover:opacity-100 transition">Home</a>
          <a href="#" class="hover:opacity-100 transition">Services</a>
          <a href="#" class="hover:opacity-100 transition">Portfolio</a>
          <a href="#" class="hover:opacity-100 transition">About Us</a>
          <a href="#" class="hover:opacity-100 transition">Careers</a>
        </nav>

        <div class="flex items-center gap-3">
          <a
            href="#"
            class="hidden sm:inline-flex px-7 py-3 rounded-xl bg-[#0A84FF] font-semibold text-sm shadow-lg shadow-blue-500/20 hover:bg-blue-500 transition"
          >
            Contact Us
          </a>

          <button class="md:hidden text-2xl opacity-80 hover:opacity-100 transition">
            <i class="ph ph-list"></i>
          </button>
        </div>
      </div>
    </header>


    <section class="max-w-7xl mx-auto px-6 mt-14">
      <div class="glass-card rounded-[48px] overflow-hidden relative">
        <div class="absolute inset-0 hero-pattern opacity-50"></div>

        <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/50 to-black/30"></div>

        <div class="relative z-10 flex flex-col lg:flex-row items-center justify-between gap-10 px-10 lg:px-16 py-14 lg:py-20">

          <div class="max-w-xl">
            <h1 class="text-4xl lg:text-6xl font-extrabold leading-tight tracking-tight">
              Build the Future with Us
            </h1>

            <p class="mt-6 text-base lg:text-lg text-white/70 leading-relaxed">
              We’re a team of builders, thinkers, and explorers using AI, machine learning, and blockchain to solve meaningful problems.
            </p>

            <button
              class="mt-10 px-8 py-4 rounded-xl bg-[#0A84FF] font-semibold shadow-xl shadow-blue-500/20 hover:bg-blue-500 transition"
            >
              Explore Open Positions
            </button>
          </div>

          <div class="relative w-full lg:w-[520px] flex justify-center">
            <div class="relative">
              <img
                src="./photoR/calogo1 2.png"
              />
              
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 mt-14">
      <div class="glass-card rounded-[34px] p-8 lg:p-10">
        <div class="flex flex-col lg:flex-row gap-4 items-center">

          <div class="flex flex-col sm:flex-row gap-4 w-full">
            <div class="w-full sm:w-[220px] flex items-center justify-between px-6 py-4 rounded-full bg-black/40 soft-border text-white/70">
              <span class="text-sm">Departments</span>
              <i class="ph ph-caret-down text-lg"></i>
            </div>

            <div class="w-full sm:w-[220px] flex items-center justify-between px-6 py-4 rounded-full bg-black/40 soft-border text-white/70">
              <span class="text-sm">Experience</span>
              <i class="ph ph-caret-down text-lg"></i>
            </div>

            <div class="w-full sm:w-[220px] flex items-center justify-between px-6 py-4 rounded-full bg-black/40 soft-border text-white/70">
              <span class="text-sm">Job Type</span>
              <i class="ph ph-caret-down text-lg"></i>
            </div>

            <div class="w-full sm:w-[240px] flex items-center justify-between px-6 py-4 rounded-full bg-black/40 soft-border text-white/70">
              <span class="text-sm">Workplace Type</span>
              <i class="ph ph-caret-down text-lg"></i>
            </div>
          </div>


          <div class="w-full lg:flex-1 flex gap-3 px-14 py-1 rounded-full bg-black/40 soft-border">
            <input
              type="text"
              placeholder="Search by keywords..."
              class="w-full bg-transparent text-sm text-white/80 placeholder:text-white/30 input-glow"
            />
            <button class="w-12 h-12 rounded-full bg-[#0A84FF] flex items-center justify-center shadow-lg shadow-blue-500/20">
              <img src="./photoR/Icon-2.png" alt="">
            </button>
          </div>
        </div>
      </div>
    </section>


    
  </body>
</html>
