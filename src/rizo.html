<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalyst Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        font-family: "Inter", sans-serif;
      }

      body {
        background: radial-gradient(circle at top, #0d0f13 0%, #050607 55%, #000 100%);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0px 20px 80px rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(12px);
      }

      .grid-bg {
        background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 42px 42px;
      }

      .hero-pattern {
        background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 55px 55px;
      }

      .soft-border {
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .input-glow:focus {
        outline: none;
        box-shadow: 0px 0px 0px 4px rgba(0, 122, 255, 0.25);
      }
    </style>
  </head>

  <body class="text-white">
    <header class="w-full pt-8">
      <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="./photoR/Logo.png" alt="">
        </div>

        <nav class="hidden md:flex items-center gap-10 text-sm font-medium opacity-80">
          <a href="#" class="hover:opacity-100 transition">Home</a>
          <a href="#" class="hover:opacity-100 transition">Services</a>
          <a href="#" class="hover:opacity-100 transition">Portfolio</a>
          <a href="#" class="hover:opacity-100 transition">About Us</a>
          <a href="#" class="hover:opacity-100 transition">Careers</a>
        </nav>

        <div class="flex items-center gap-3">
          <a
            href="#"
            class="hidden sm:inline-flex px-7 py-3 rounded-xl bg-[#0A84FF] font-semibold text-sm shadow-lg shadow-blue-500/20 hover:bg-blue-500 transition"
          >
            Contact Us
          </a>

          <button class="md:hidden text-2xl opacity-80 hover:opacity-100 transition">
            <i class="ph ph-list"></i>
          </button>
        </div>
      </div>
    </header>


    
  </body>
</html>
