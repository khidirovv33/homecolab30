<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>

<body class="bg-black text-white overflow-x-hidden">

  <section class="relative min-h-screen bg-black">
    
    <img src="../Sunat_images/Frame (6).png" alt="dots" class="absolute inset-0 w-full h-full object-cover opacity-40 pointer-events-none">

    <div class="absolute right-[-120px] top-[120px] w-[420px] h-[420px] rounded-full bg-blue-700/30 blur-[140px] hidden lg:block"></div>

    <header class="relative z-10 max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-10 py-4">
      <div class="flex items-center justify-between">
        
        <a href="#" class="shrink-0">
          <img src="../Sunat_images/Logo (5).png" alt="logo" class="w-[120px] sm:w-[135px] lg:w-[150px]">
        </a>

        <nav class="hidden lg:flex items-center gap-10 text-[14px] text-white/80">
          <a href="#" class="hover:text-white transition">Home</a>
          <a href="#" class="hover:text-white transition">Services</a>
          <a href="#" class="hover:text-white transition">Portfolio</a>
          <a href="#" class="hover:text-white transition">About Us</a>
          <a href="#" class="hover:text-white transition">Careers</a>
        </nav>

        <div class="hidden lg:block">
          <button class="bg-[#0B84FF] hover:bg-[#0977e5] transition px-6 py-3 rounded-xl text-sm font-medium">
            Contact Us
          </button>
        </div>

      </div>
    </header>

    <div class="relative z-10 max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-10 pt-8 lg:pt-16 pb-12 lg:pb-20">
      <div class="grid lg:grid-cols-2 items-center gap-10 lg:gap-6">

        <div class="max-w-[620px]">
          <h1 class="text-[40px] leading-[46px] sm:text-[56px] sm:leading-[62px] lg:text-[76px] lg:leading-[82px] font-extrabold tracking-[-0.02em]">
            Transforming Data <br>
            into
            <span class="inline-flex items-center bg-[#0B84FF] px-4 sm:px-5 lg:px-6 py-1 rounded-2xl mt-2">
              Decisions
            </span>
          </h1>

          <p class="mt-6 text-white/65 text-[15px] leading-7 sm:text-[16px] max-w-[520px]">
            Leverage the power of machine learning and AI to unlock insights and drive business growth
          </p>

          <div class="mt-8">
            <button class="bg-[#0B84FF] hover:bg-[#0977e5] transition px-6 sm:px-7 py-3 sm:py-4 rounded-xl text-sm sm:text-base font-semibold">
              Book a Meeting
            </button>
          </div>

          <div class="mt-8 flex items-center gap-4">
            <div class="flex -space-x-3">
              <img src="../Sunat_images/image 1 (2).png" alt="user" class="w-10 h-10 rounded-full border-2 border-black object-cover">
              <img src="../Sunat_images/image 2 (1).png" alt="user" class="w-10 h-10 rounded-full border-2 border-black object-cover">
              <img src="../Sunat_images/image 3 (1).png" alt="user" class="w-10 h-10 rounded-full border-2 border-black object-cover">
            </div>
            <p class="text-white/75 text-sm sm:text-base">
              Over 100+ clients have worked with us
            </p>
          </div>
        </div>

        <div class="relative flex justify-center lg:justify-end">
          <img src="../Sunat_images/robot area.png" alt="robot" class="relative z-10 w-[280px] sm:w-[380px] lg:w-[520px] xl:w-[600px] object-contain">
        </div>
      </div>
    </div>

    <div class="relative z-10 border-t border-b border-[#16335f]">
      <div class="max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-6 py-6 lg:py-8">
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 items-center gap-y-8 gap-x-6 opacity-90">
          <div class="flex justify-center">
            <img src="../Sunat_images/Card.png" alt="zapier" class="h-10 object-contain">
          </div>
          <div class="flex justify-center">
            <img src="../Sunat_images/Card (1).png" alt="spotify" class="h-10 object-contain">
          </div>
          <div class="flex justify-center">
            <img src="../Sunat_images/Card (2).png" alt=" class="h-10 object-contain">
          </div>
          <div class="flex justify-center">
            <img src="../Sunat_images/Card (3).png" alt="slack" class="h-10 object-contain">
          </div>
          <div class="flex justify-center">
            <img src="../Sunat_images/Card (4).png" alt="amazon" class="h-10 object-contain">
          </div>
          <div class="flex justify-center col-span-2 sm:col-span-1">
            <img src="../Sunat_images/Card (5).png" alt="adobe" class="h-10 object-contain">
          </div>
        </div>
      </div>
    </div>

  </section>
